# Conditional
#

# Account slugs:
#  - quickbase[o4OvZbK]: Pipeline Token <None>
---
- META:
    name: Conditional
    enabled: false
- TRIGGER quickbase[o4OvZbK] record on_create -> a:
    inputs-meta:
      export_fields: 6, 8
      table: bsxhcgm73
- QUERY quickbase[o4OvZbK] record search -> b:
    inputs-meta:
      export_fields: '19'
      query: '{3.EX.{{a.related_opportunity|int}}}AND{18.EX.1}'
      table: bsxg3uvb4
- b<>LOOP:
  - DO:
    - a<>ACTION quickbase record update -> c:
        inputs:
          pipeline_message: Search message under the Query
- IF:
  - AND:
    - b<> !empty
  - THEN:
    - a<>ACTION quickbase record update -> d:
        inputs:
          pipeline_message: Company is  {{b|max(attribute='related_opportunity')|attr('id')|int}}
  - ELSE:
    - a<>ACTION quickbase record update -> e:
        inputs:
          pipeline_message: No Opportunity found meeting search criteria in step B
...